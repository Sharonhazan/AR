<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1C1B1F">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <title>AR Trace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="camera-stream" autoplay playsinline></video>

    <div id="overlay">
        <img id="trace-image" src="" style="display:none;">
    </div>

    <div class="ui">
        <button id="menu-toggle" class="menu-toggle">
            <span class="drag-pill"></span>
        </button>

        <div class="ui-content">
            <div class="btn-row">
                <label class="md3-btn md3-filled">
                    <span class="material-symbols-rounded">image</span>
                    Load Image
                    <input type="file" id="image-loader" accept="image/*" hidden>
                </label>
            </div>

            <div class="btn-row">
                <button id="fit-btn" class="md3-btn md3-tonal">
                    <span class="material-symbols-rounded">fit_screen</span>
                    Fit to Screen
                </button>
                <button id="lock-btn" class="md3-btn md3-tonal">
                    <span class="material-symbols-rounded">lock_open</span>
                    Lock Position
                </button>
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span class="material-symbols-rounded">opacity</span> Opacity
                </div>
                <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span class="material-symbols-rounded">zoom_in</span> Scale
                </div>
                <input type="range" id="scale-slider" min="0.1" max="5" step="0.05" value="1">
            </div>

            <div class="slider-group">
                <div class="slider-row">
                    <div class="slider-label">
                        <span class="material-symbols-rounded">rotate_right</span> Rotate
                    </div>
                    <button id="rotate-reset" class="md3-btn-icon" title="Reset rotation">
                        <span class="material-symbols-rounded">restart_alt</span>
                    </button>
                </div>
                <input type="range" id="rotate-slider" min="-180" max="180" step="1" value="0">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
