<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <title>AR Trace</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #000; font-family: system-ui; }
        #camera-stream { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #trace-image { max-width: 90%; opacity: 0.5; transition: transform 0.1s linear; }
        #trace-image.fit-screen { width: 100vw; height: 100vh; max-width: none; object-fit: contain; }
        .ui { position: fixed; bottom: 0; left: 0; width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.85); padding: 12px 16px 16px; color: white; z-index: 10; font-size: 12px; }
        .ui label { margin: 0; }
        input[type=range] { width: 100%; margin: 2px 0 6px; height: 20px; }
        .file-btn { background: #444; padding: 6px; display: block; text-align: center; border-radius: 8px; margin-bottom: 6px; font-size: 12px; }
    </style>
</head>
<body>

    <video id="camera-stream" autoplay playsinline></video>
    
    <div id="overlay">
        <img id="trace-image" src="" style="display:none;">
    </div>

    <div class="ui">
        <label class="file-btn">
            Load Image <input type="file" id="image-loader" accept="image/*" hidden>
        </label>
        
        <button id="fit-btn" class="file-btn">Fit to Screen</button>
        <label>Opacity</label>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
        
        <label>Scale</label>
        <input type="range" id="scale-slider" min="0.1" max="5" step="0.05" value="1">
    </div>

    <script src="app.js"></script>
</body>
</html>
